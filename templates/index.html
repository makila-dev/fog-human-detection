{% extends "base.html" %}

{% block content %}

<div class="card text-center">

    <h2>🌫️ Fog Human Detection</h2>
    <p>Upload a foggy image to detect humans using AI</p>

    <form method="POST" enctype="multipart/form-data" class="mt-4">
        <input type="file" name="image" required>
        <br><br>
        <button type="submit" class="btn btn-primary">Detect</button>
    </form>

    {% if error %}
        <p style="color: #ff6b6b; margin-top: 10px;">{{ error }}</p>
    {% endif %}

    {% if uploaded_image %}
        <h4 class="mt-4">Uploaded Image</h4>
        <img src="{{ uploaded_image }}" width="300">
    {% endif %}

    {% if result_image %}
        <h4 class="mt-4">Detection Result</h4>
        <img src="{{ result_image }}" width="300">
    {% endif %}

</div>

{% endblock %}
