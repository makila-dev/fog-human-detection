<!DOCTYPE html>
<html>
<head>
    <title>Fog Detection System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f5f7fa;
        color: #1e293b;
    }

    /* NAVBAR */
    .navbar {
        background-color: #99e6ff; /* 🔥 your color */
        border-bottom: 1px solid #cceeff;
    }

    .navbar-brand {
        font-weight: 600;
        letter-spacing: 1px;
        color: #0f172a !important;
    }

    .nav-link {
        color: #0f172a !important;
        margin-right: 15px;
        transition: 0.3s;
        font-weight: 500;
    }

    .nav-link:hover {
        color: #2563eb !important;
        transform: scale(1.05);
    }

    /* CARD */
    .card {
        background: #ffffff;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        border: none;
    }

    .container-box {
        margin-top: 60px;
    }

    h2, h3, h4 {
        font-weight: 600;
        color: #0f172a;
    }

    p {
        color: #475569;
        line-height: 1.6;
    }

    ul {
        color: #475569;
    }

    /* BUTTON */
    .btn-primary {
        background: linear-gradient(45deg, #3b82f6, #6366f1);
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        transition: 0.3s;
    }

    .btn-primary:hover {
        transform: scale(1.05);
        background: linear-gradient(45deg, #2563eb, #4f46e5);
    }

    /* FILE INPUT */
    input[type="file"] {
        background: #ffffff;
        border: 1px solid #cbd5f5;
        padding: 10px;
        border-radius: 10px;
        color: #1e293b;
    }

    /* IMAGE */
    img {
        border-radius: 15px;
        margin-top: 15px;
        border: 2px solid #e2e8f0;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        transition: 0.3s;
    }

    img:hover {
        transform: scale(1.03);
    }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">🌫️ Fog Detection</a>

        <div>
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/about">About</a>
            <a class="nav-link d-inline" href="/detect">Detection</a>
            <a class="nav-link d-inline" href="/live">Live</a>
            <a class="nav-link d-inline" href="/contact">Contact</a>
        </div>
    </div>
</nav>

<div class="container container-box">
    {% block content %}{% endblock %}
</div>

</body>
</html>
